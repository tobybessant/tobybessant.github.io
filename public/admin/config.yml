backend:
  name: github
  repo: tobybessant/portfolio
  branch: master # Branch to update (optional; defaults to master)
  api_root: https://api.github.com
publish_mode: editorial_workflow
media_folder: public/img # Media files will be stored in the repo under image-uploads
public_folder: img # The src attribute for uploaded media will begin with /images/uploads
collections:
  - name: "project" # Used in routes, e.g., /admin/collections/blog
    label: "Project" # Used in the UI
    folder: "content/_projects" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
