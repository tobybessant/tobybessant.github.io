{{ $c := site.Data.contact }}
{{ if $c.enabled }}
<section class="section">
  <span id="contact" class="section-anchor"></span>
  <h2 class="section-heading">{{ $c.heading }}</h2>
  <p class="prose">{{ $c.intro }} <a href="#" data-email="{{ $c.email }}">{{ $c.emailLinkText }}</a>.</p>
</section>
{{ end }}
